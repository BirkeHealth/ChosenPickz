<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChosenPickz — Create Handicapper Account</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-container">

    <div class="login-brand">
      <div class="brand-logo">
        <span class="brand-icon">⚡</span>
        <h1>ChosenPickz</h1>
      </div>
      <p class="brand-tagline">Handicapper Portal</p>
    </div>

    <div class="login-card">
      <h2>Create Account</h2>
      <p class="login-subtitle">Register as a handicapper</p>

      <div id="register-error" class="alert alert-error hidden"></div>
      <div id="register-success" class="alert alert-success hidden"></div>

      <form id="register-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a username (3–50 characters)"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="At least 8 characters"
              autocomplete="new-password"
              required
            >
            <button type="button" class="toggle-password" id="toggle-pw" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              required
            >
            <button type="button" class="toggle-password" id="toggle-pw2" aria-label="Toggle confirm password visibility">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="login-footer-note" style="margin-top:1.25rem; text-align:center; font-size:0.875rem; color:var(--text-muted);">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>

    <div class="login-footer">
      <p>&copy; 2024 ChosenPickz. All rights reserved.</p>
    </div>

  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    AuthManager.initSession().then(session => {
      if (session) window.location.replace('dashboard.html');
    });

    document.getElementById('toggle-pw').addEventListener('click', function () {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('toggle-pw2').addEventListener('click', function () {
      const pw = document.getElementById('confirm-password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const btn      = document.getElementById('register-btn');
      const errEl    = document.getElementById('register-error');
      const okEl     = document.getElementById('register-success');

      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      if (!name || !email || !username || !password || !confirm) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.classList.remove('hidden');
        return;
      }

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ name, email, username, password, role: 'handicapper' }),
        });

        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed. Please try again.';
          errEl.classList.remove('hidden');
        } else {
          okEl.textContent = 'Account created! Redirecting to login…';
          okEl.classList.remove('hidden');
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
