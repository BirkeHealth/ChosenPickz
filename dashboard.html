<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChosenPickz — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <!-- Quill rich text editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="sidebar">

      <div class="sidebar-brand">
        <span class="brand-icon-sm">⚡</span>
        <div>
          <div class="brand-text">ChosenPickz</div>
          <div class="brand-sub">Handicapper Portal</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Menu</div>

        <a href="#" data-nav="overview">
          <span class="nav-icon">📊</span> Overview
        </a>
        <a href="#" data-nav="picks">
          <span class="nav-icon">🎯</span> My Picks
        </a>
        <a href="#" data-nav="blog">
          <span class="nav-icon">✍️</span> Blog Posts
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar-initial"></div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="user-display-name"></div>
            <div class="sidebar-user-role">Handicapper</div>
          </div>
        </div>
        <button id="logout-btn">
          <span>🚪</span> Log Out
        </button>
      </div>

    </aside>

    <!-- ── Main wrapper ──────────────────────────────────────────────────── -->
    <div class="main-wrapper">

      <!-- Top header -->
      <header class="top-header">
        <button id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div id="page-title">Overview</div>
        <div class="header-user">
          <div class="header-avatar" id="user-avatar-initial-header"></div>
          <span class="header-name" id="user-display-name-header"></span>
        </div>
      </header>

      <!-- Content -->
      <main class="main-content">

        <!-- Overview -->
        <div class="view" id="view-overview"></div>

        <!-- Picks list -->
        <div class="view" id="view-picks"></div>

        <!-- Pick form (add / edit) -->
        <div class="view" id="view-pick-form"></div>

        <!-- Blog list -->
        <div class="view" id="view-blog"></div>

        <!-- Blog editor (add / edit) -->
        <div class="view" id="view-blog-form"></div>

        <!-- Blog article preview -->
        <div class="view" id="view-blog-preview"></div>

      </main>
    </div>
  </div>

  <!-- ── Confirm Modal ──────────────────────────────────────────────────── -->
  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-title">Confirm Action</div>
      <div class="modal-msg" id="modal-msg"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-danger" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/picks.js"></script>
  <script src="js/blog.js"></script>
  <script src="js/dashboard.js"></script>

  <script>
    // Sync header user info once DOM + scripts are ready
    document.addEventListener('DOMContentLoaded', () => {
      const session = AuthManager.getSession();
      if (!session) return;
      const hAvatar = document.getElementById('user-avatar-initial-header');
      const hName   = document.getElementById('user-display-name-header');
      if (hAvatar) hAvatar.textContent = session.name.charAt(0).toUpperCase();
      if (hName)   hName.textContent   = session.name;
    });
  </script>

</body>
</html>
