<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChosenPickz — Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="sidebar">

      <div class="sidebar-brand">
        <span class="brand-icon-sm">⚡</span>
        <div>
          <div class="brand-text">ChosenPickz</div>
          <div class="brand-sub">Admin Panel</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Admin</div>
        <a href="#" data-nav="users" class="active">
          <span class="nav-icon">👥</span> Users
        </a>
        <a href="#" data-nav="posts">
          <span class="nav-icon">📝</span> Posts
        </a>

        <div class="nav-section-label" style="margin-top:1rem;">Portal</div>
        <a href="dashboard.html">
          <span class="nav-icon">📊</span> My Dashboard
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar-initial"></div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="user-display-name"></div>
            <div class="sidebar-user-role">Administrator</div>
          </div>
        </div>
        <button id="logout-btn">
          <span>🚪</span> Log Out
        </button>
      </div>

    </aside>

    <!-- ── Main wrapper ──────────────────────────────────────────────────── -->
    <div class="main-wrapper">

      <!-- Top header -->
      <header class="top-header">
        <button id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div id="page-title">Users</div>
        <div class="header-user">
          <div class="header-avatar" id="user-avatar-initial-header"></div>
          <span class="header-name" id="user-display-name-header"></span>
        </div>
      </header>

      <!-- Content -->
      <main class="main-content">

        <!-- Users view -->
        <div class="view" id="view-users">
          <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <h2 style="font-size:1.25rem;font-weight:700;">Users</h2>
            <input id="user-search" type="search" placeholder="Search by name, email, username…"
              style="padding:0.45rem 0.75rem;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.875rem;width:260px;">
          </div>
          <div id="users-error" class="alert alert-error hidden"></div>
          <div id="users-table-wrap" style="overflow-x:auto;">
            <table class="admin-table" id="users-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Posts view -->
        <div class="view" id="view-posts" style="display:none;">
          <div class="section-header" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.25rem;">
            <h2 style="font-size:1.25rem;font-weight:700;flex:1;">Posts</h2>
            <select id="post-filter-status" style="padding:0.45rem 0.75rem;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.875rem;">
              <option value="">All Statuses</option>
              <option value="Draft">Draft</option>
              <option value="Published">Published</option>
              <option value="Archived">Archived</option>
            </select>
            <input id="post-search" type="search" placeholder="Search posts…"
              style="padding:0.45rem 0.75rem;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.875rem;width:220px;">
          </div>
          <div id="posts-error" class="alert alert-error hidden"></div>
          <div id="posts-table-wrap" style="overflow-x:auto;">
            <table class="admin-table" id="posts-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Category</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="posts-tbody">
                <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- ── Confirm Modal ──────────────────────────────────────────────────── -->
  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">Confirm Action</div>
      <div class="modal-msg" id="modal-msg"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-danger" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ── Admin table styles ──────────────────────────────────────────────── -->
  <style>
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .admin-table th {
      text-align: left;
      padding: 0.65rem 0.85rem;
      background: var(--bg-secondary);
      border-bottom: 2px solid var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .admin-table td {
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-admin    { background: rgba(245,158,11,0.15); color: var(--accent); }
    .badge-handicapper { background: rgba(88,166,255,0.15); color: var(--blue); }
    .badge-member   { background: rgba(255,255,255,0.08); color: var(--text-muted); }
    .badge-published { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-draft    { background: rgba(255,255,255,0.08); color: var(--text-muted); }
    .badge-archived { background: rgba(248,81,73,0.12); color: var(--red); }
    .badge-active   { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-disabled { background: rgba(248,81,73,0.12); color: var(--red); }
    .action-btn {
      padding: 0.3rem 0.65rem;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: background 0.15s, color 0.15s;
      margin-right: 0.3rem;
    }
    .action-btn:hover { background: rgba(255,255,255,0.06); }
    .action-btn.btn-danger-sm { border-color: var(--red); color: var(--red); }
    .action-btn.btn-danger-sm:hover { background: var(--red-bg); }
    .action-btn.btn-success-sm { border-color: var(--green); color: var(--green); }
    .action-btn.btn-success-sm:hover { background: var(--green-bg); }
  </style>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const session = await AuthManager.requireAuth();
      if (!session) return;

      // Require admin role
      if (session.role !== 'admin') {
        window.location.href = 'dashboard.html';
        return;
      }

      // Populate header/sidebar user info
      const initials = session.name.charAt(0).toUpperCase();
      document.getElementById('user-avatar-initial').textContent         = initials;
      document.getElementById('user-display-name').textContent           = session.name;
      document.getElementById('user-avatar-initial-header').textContent  = initials;
      document.getElementById('user-display-name-header').textContent    = session.name;

      AdminPanel.init(session);
    });
  </script>

</body>
</html>
