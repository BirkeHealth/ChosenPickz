<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChosenPickz — Checkout</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .plan-summary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .plan-summary-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .plan-summary-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
    }

    .plan-summary-period {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .plan-change {
      font-size: 0.8rem;
      color: var(--blue);
      cursor: pointer;
      white-space: nowrap;
    }

    .plan-change:hover { text-decoration: underline; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.25rem 0;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 480px) {
      .form-row-2 { grid-template-columns: 1fr; }
    }

    .secure-note {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .secure-note span { margin-right: 0.3rem; }
  </style>
</head>
<body class="login-body">

  <div class="checkout-container">

    <div class="login-brand">
      <div class="brand-logo">
        <span class="brand-icon">⚡</span>
        <h1>ChosenPickz</h1>
      </div>
      <p class="brand-tagline">Secure Checkout</p>
    </div>

    <div class="plan-summary" id="plan-summary">
      <div>
        <div class="plan-summary-name" id="plan-name">—</div>
        <div style="font-size:0.8rem;color:var(--text-muted);" id="plan-desc"></div>
      </div>
      <div style="text-align:right;">
        <div class="plan-summary-price" id="plan-price">—</div>
        <a href="index.html#pricing" class="plan-change">Change plan</a>
      </div>
    </div>

    <div class="login-card">
      <h2>Payment Details</h2>
      <p class="login-subtitle">Your subscription starts today</p>

      <div id="checkout-error" class="alert alert-error hidden"></div>
      <div id="checkout-success" class="alert alert-success hidden"></div>

      <form id="checkout-form" autocomplete="on" novalidate>

        <div class="form-group">
          <label for="full-name">Full Name</label>
          <input
            type="text"
            id="full-name"
            name="full-name"
            placeholder="Name on card"
            autocomplete="cc-name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <hr class="divider">

        <div class="form-group">
          <label for="card-number">Card Number</label>
          <input
            type="text"
            id="card-number"
            name="card-number"
            placeholder="1234 5678 9012 3456"
            autocomplete="cc-number"
            inputmode="numeric"
            maxlength="19"
            required
          >
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label for="expiry">Expiry Date</label>
            <input
              type="text"
              id="expiry"
              name="expiry"
              placeholder="MM / YY"
              autocomplete="cc-exp"
              inputmode="numeric"
              maxlength="7"
              required
            >
          </div>
          <div class="form-group">
            <label for="cvv">CVV</label>
            <input
              type="text"
              id="cvv"
              name="cvv"
              placeholder="123"
              autocomplete="cc-csc"
              inputmode="numeric"
              maxlength="4"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="checkout-btn">
          Subscribe Now
        </button>

      </form>

      <p class="secure-note"><span>🔒</span>Payments are encrypted and secure. Cancel anytime.</p>

      <div class="login-footer-note" style="margin-top:1rem; text-align:center; font-size:0.875rem; color:var(--text-muted);">
        Already a member? <a href="login.html">Sign in</a>
      </div>
    </div>

    <div class="login-footer">
      <p>&copy; 2026 ChosenPickz. All rights reserved.</p>
    </div>

  </div>

  <script>
    const PLANS = {
      starter: { name: 'Starter',       price: '$25',  period: '/week',      desc: '1 Pick a day · Email Alerts · Free Discord' },
      pro:     { name: 'Pro',            price: '$45',  period: '/bi-weekly', desc: 'Unlimited Picks · Premium Discords · Real Time Alerts' },
      elite:   { name: 'Elite',          price: '$150', period: '/month',     desc: 'Everything in Pro · VIP Discord · 1-on-1 Coaching' },
      chosen1: { name: 'Ch0sen1 Plan',   price: '$250', period: '',           desc: 'Custom Picks · Live Chat 24/7 · Everything in Elite' },
    };

    const params = new URLSearchParams(window.location.search);
    const key    = (params.get('plan') || '').toLowerCase();
    const plan   = PLANS[key] || null;

    if (plan) {
      document.getElementById('plan-name').textContent  = plan.name;
      document.getElementById('plan-price').innerHTML   =
        plan.price + '<span class="plan-summary-period">' + plan.period + '</span>';
      document.getElementById('plan-desc').textContent  = plan.desc;
    } else {
      document.getElementById('plan-summary').style.display = 'none';
    }

    // Card number formatting
    document.getElementById('card-number').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 16);
      this.value = v.replace(/(.{4})/g, '$1 ').trim();
    });

    // Expiry formatting
    document.getElementById('expiry').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 4);
      if (v.length > 2) v = v.slice(0, 2) + ' / ' + v.slice(2);
      this.value = v;
    });

    // CVV: digits only
    document.getElementById('cvv').addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 4);
    });

    document.getElementById('checkout-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const errEl = document.getElementById('checkout-error');
      const okEl  = document.getElementById('checkout-success');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      const name   = document.getElementById('full-name').value.trim();
      const email  = document.getElementById('email').value.trim();
      const card   = document.getElementById('card-number').value.replace(/\s/g, '');
      const expiry = document.getElementById('expiry').value.trim();
      const cvv    = document.getElementById('cvv').value.trim();

      if (!name || !email || card.length < 13 || !expiry || cvv.length < 3) {
        errEl.textContent = 'Please fill in all payment details correctly.';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('checkout-btn');
      btn.textContent = 'Processing…';
      btn.disabled = true;

      // TODO: Integrate a real payment processor (e.g. Stripe) here.
      setTimeout(function () {
        okEl.textContent = 'Payment successful! Welcome to ChosenPickz 🎉 Check your email for details.';
        okEl.classList.remove('hidden');
        btn.textContent = 'Subscribe Now';
        btn.disabled = false;
      }, 1500);
    });
  </script>

</body>
</html>
