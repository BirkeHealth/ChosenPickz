  <style>
    .blog-post-wrapper { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
    .blog-post-card { background: #13131a; border: 1px solid #1e1e2a; border-radius: 0.75rem; padding: 2rem 2.5rem; }
    .blog-post-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 6vw, 3rem); color: #e8e8f0; letter-spacing: 1px; line-height: 1.1; margin-bottom: 0.5rem; }
    .blog-post-meta { font-size: 0.8rem; color: #555570; margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 1px solid #1e1e2a; }
    /* Prose styles for Quill-generated content */
    .blog-post-body { color: #c8c8d8; font-size: 1rem; line-height: 1.8; }
    .blog-post-body h1, .blog-post-body h2, .blog-post-body h3 { color: #e8e8f0; font-weight: 700; margin: 1.5rem 0 0.5rem; line-height: 1.3; }
    .blog-post-body h1 { font-size: 1.6rem; }
    .blog-post-body h2 { font-size: 1.3rem; }
    .blog-post-body h3 { font-size: 1.1rem; }
    .blog-post-body p { margin: 0.75rem 0; }
    .blog-post-body ul, .blog-post-body ol { padding-left: 1.5rem; margin: 0.75rem 0; }
    .blog-post-body li { margin: 0.3rem 0; }
    .blog-post-body blockquote { border-left: 3px solid #d4a843; margin: 1rem 0; padding: 0.5rem 0 0.5rem 1rem; color: #8888a0; font-style: italic; }
    .blog-post-body strong { color: #e8e8f0; font-weight: 700; }
    .blog-post-body a { color: #d4a843; text-decoration: underline; }
    .blog-post-body a:hover { color: #f0c060; }
    .blog-post-body img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }
    .blog-post-back { display: inline-block; margin-top: 1.5rem; color: #8888a0; font-size: 0.875rem; text-decoration: none; transition: color 0.2s; }
    .blog-post-back:hover { color: #d4a843; }
    .loading-msg, .error-msg { color: #8888a0; font-size: 0.95rem; }
  </style>
</head>
