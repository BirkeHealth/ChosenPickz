  <style>
    /* ── Best-Odds page specific styles ── */
    .bo-hero {

  <!-- config.js still loaded for NewsAPI / EmailJS keys used by other pages -->
  <script src="config.js"></script>
  <script>
    /**
     * best-odds.js — Best Available Odds search page
     *
     * All Odds API calls are routed through the server-side proxy at /api/odds
     * and /api/sports so that the API key is never exposed in the browser.
     *
     * Best-practices implemented:
     *  • Live mode omits date filters (commenceTimeFrom/To cause 422 on live).
     *  • Upcoming mode uses /v4/sports/upcoming/odds via the proxy.
     *  • Sport list is populated dynamically from /api/sports (5-min cache).
     *  • Debounced sport-change handler avoids excessive API requests.
     *  • All available bookmaker lines are rendered — no artificial cap.
     *  • h2h, spreads, and totals are all fetched and displayed.
     *  • HTTP 422 / 429 / 5xx errors show specific, actionable messages.
     */

    // ── STATE ────────────────────────────────────────────────────────────────
    let currentMode = 'today'; // 'live' | 'today' | 'upcoming' | 'date'
    let searchDebounceTimer = null;

    // ── CONSTANTS ────────────────────────────────────────────────────────────
    const MS_PER_DAY = 24 * 60 * 60 * 1000;

    // Emoji prefix map for sport groups returned by /api/sports
    const SPORT_EMOJI = {
      americanfootball: '🏈',
      basketball:       '🏀',
      baseball:         '⚾',
      icehockey:        '🏒',
      soccer:           '⚽',
      mma:              '🥊',
      tennis:           '🎾',
      boxing:           '🥊',
      golf:             '⛳',
      cricket:          '🏏',
      rugbyleague:      '🏉',
      rugbyunion:       '🏉',
    };

    // ── INIT ─────────────────────────────────────────────────────────────────
    (function init() {
      // Seed date picker with today's date
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('date-input').value = today;

      // Tab click handler
      document.getElementById('time-tabs').addEventListener('click', function(e) {
        const btn = e.target.closest('.bo-tab-btn');
        if (!btn) return;
        const mode = btn.dataset.mode;
        setMode(mode);
        if (mode !== 'date') searchOdds();
      });

      // Search button (used in 'date' mode)
      document.getElementById('search-btn').addEventListener('click', searchOdds);

      // Debounced sport-change handler — avoids firing a request on every keystroke
      document.getElementById('sport-select').addEventListener('change', function() {
        if (currentMode !== 'date') {
          clearTimeout(searchDebounceTimer);
          searchDebounceTimer = setTimeout(searchOdds, 300);
        }
      });

      // Load sports list from the backend, then auto-load initial results
      loadSports().then(searchOdds);
    })();

    // ── SPORTS LIST ──────────────────────────────────────────────────────────

    /**
     * Fetch all active sports from /api/sports and populate the sport selector.
     * Falls back to the hardcoded <option> elements already in the HTML if the
     * request fails, so the page always remains functional.
     */
    async function loadSports() {
      try {
        const res = await fetch('/api/sports');
        if (!res.ok) return; // silently fall back to hardcoded options
        const sports = await res.json();
        if (!Array.isArray(sports) || sports.length === 0) return;

        const activeSports = sports.filter(s => s.active && !s.has_outrights);
        if (activeSports.length === 0) return;

        const select = document.getElementById('sport-select');
        const currentVal = select.value;

        select.innerHTML =
          '<option value="upcoming">🌟 All Sports (Upcoming)</option>' +
          activeSports.map(function(s) {
            const prefix = s.key.split('_')[0];
            const emoji  = SPORT_EMOJI[prefix] || '🏆';
            return '<option value="' + escHtml(s.key) + '">' + emoji + ' ' + escHtml(s.title) + '</option>';
          }).join('');

        // Restore the previously selected value if it still exists.
        // Escape the value to prevent selector injection.
        const escapedVal = currentVal.replace(/["\\]/g, '\\$&');
        if (select.querySelector('option[value="' + escapedVal + '"]')) {
          select.value = currentVal;
        }
      } catch (err) {
        console.warn('[best-odds] Could not load sports list:', err.message);
      }
    }

    // ── MODE / UI ────────────────────────────────────────────────────────────

    function setMode(mode) {
      currentMode = mode;
      // Cancel any pending debounced search to avoid stale results
      clearTimeout(searchDebounceTimer);
      document.querySelectorAll('.bo-tab-btn').forEach(function(b) { b.classList.remove('active'); });
      const activeBtn = document.querySelector('.bo-tab-btn[data-mode="' + mode + '"]');
      if (activeBtn) activeBtn.classList.add('active');
      document.getElementById('date-controls').style.display = mode === 'date' ? 'flex' : 'none';
    }

    // ── HELPERS ──────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function fmtOdds(price) {
      if (typeof price !== 'number') return 'N/A';
      return price >= 0 ? '+' + price : String(price);
    }

    function fmtTime(isoString) {
      return new Date(isoString).toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit',
      });
    }

    function sportLabel(key) {
      const labels = {
        americanfootball_nfl:   'NFL',
        americanfootball_ncaaf: 'NCAAF',
        basketball_nba:         'NBA',
        basketball_ncaab:       'NCAAB',
        baseball_mlb:           'MLB',
        icehockey_nhl:          'NHL',
        soccer_usa_mls:         'MLS',
        soccer_epl:             'EPL',
        mma_mixed_martial_arts: 'MMA',
      };
      return labels[key] || key.replace(/_/g, ' ').toUpperCase();
    }

    /**
     * Return user-friendly error text for a given HTTP status code.
     * @param {number} status
     * @param {string} [rawMsg]
     * @returns {string}
     */
    function apiErrorMessage(status, rawMsg) {
      if (status === 422) {
        return 'The request parameters are invalid for this endpoint (HTTP 422). ' +
          'This can happen when the selected sport has no events in the chosen window. ' +
          'Try a different sport or time range.';
      }
      if (status === 429) {
        return 'API rate limit reached (HTTP 429). Please wait a moment and try again.';
      }
      if (status === 401 || status === 403) {
        return 'API authentication error (HTTP ' + status + '). Please check the server configuration.';
      }
      if (status >= 500) {
        return 'The odds server is currently unavailable (HTTP ' + status + '). Please try again later.';
      }
      return rawMsg || 'Failed to load odds (HTTP ' + status + '). Please try again.';
    }

    // ── BEST-ODDS CALCULATOR ──────────────────────────────────────────────────

    /**
     * Scan all bookmakers for the given event and return the best
     * (highest payout) odds per outcome for the specified market.
     * American odds: numerically larger value = better payout for the bettor
     * (e.g. +170 > +150 and -110 > -200).
     */
    function getBestOddsByMarket(bookmakers, marketKey) {
      const best = {};
      for (const bm of bookmakers) {
        const market = (bm.markets || []).find(function(m) { return m.key === marketKey; });
        if (!market) continue;
        for (const outcome of market.outcomes) {
          const prev = best[outcome.name];
          if (!prev || outcome.price > prev.price) {
            best[outcome.name] = {
              name:           outcome.name,
              price:          outcome.price,
              point:          outcome.point,
              bookmakerTitle: bm.title || bm.key,
            };
          }
        }
      }
      return Object.values(best);
    }

    // ── RENDER ────────────────────────────────────────────────────────────────

    /**
     * Build HTML for a single best-odds pill (moneyline only — most important
     * line for quick decision-making).
     */
    function renderBestPills(bookmakers) {
      const bestH2H = getBestOddsByMarket(bookmakers, 'h2h');
      if (bestH2H.length === 0) return '';

      // ── Moneyline (h2h) ──
      const h2hPillsHtml = bestH2H.map(function(o) {
        const cls   = o.price >= 0 ? 'positive' : 'negative';
        const fmted = fmtOdds(o.price);
        return '<div class="bo-best-pill">' +
          '<div class="team-name">'   + escHtml(o.name)            + '</div>' +
          '<div class="best-price ' + cls + '">' + escHtml(fmted) + '</div>' +
          '<div class="via-book">via ' + escHtml(o.bookmakerTitle) + '</div>' +
          '</div>';
      }).join('');
      let html = '<div class="bo-best-label">&#127942; Best Moneyline (h2h)</div>' +
                 '<div class="bo-best-row">' + h2hPillsHtml + '</div>';

      // ── Spread ──
      const bestSpread = getBestOddsByMarket(bookmakers, 'spreads');
      if (bestSpread.length > 0) {
        const spreadPillsHtml = bestSpread.map(function(o) {
          const cls   = o.price >= 0 ? 'positive' : 'negative';
          const fmted = fmtOdds(o.price);
          const pt    = (o.point !== undefined && o.point !== null)
            ? ' (' + (o.point > 0 ? '+' : '') + o.point + ')' : '';
          return '<div class="bo-best-pill">' +
            '<div class="team-name">'   + escHtml(o.name) + escHtml(pt) + '</div>' +
            '<div class="best-price ' + cls + '">' + escHtml(fmted) + '</div>' +
            '<div class="via-book">via ' + escHtml(o.bookmakerTitle) + '</div>' +
            '</div>';
        }).join('');
        html += '<div class="bo-best-label" style="margin-top:0.75rem;">&#128200; Best Spread</div>' +
                '<div class="bo-best-row">' + spreadPillsHtml + '</div>';
      }

      // ── Over/Under (totals) ──
      const bestTotals = getBestOddsByMarket(bookmakers, 'totals');
      if (bestTotals.length > 0) {
        const totalsPillsHtml = bestTotals.map(function(o) {
          const cls   = o.price >= 0 ? 'positive' : 'negative';
          const fmted = fmtOdds(o.price);
          const pt    = (o.point !== undefined && o.point !== null)
            ? ' ' + o.point : '';
          return '<div class="bo-best-pill">' +
            '<div class="team-name">'   + escHtml(o.name) + escHtml(pt) + '</div>' +
            '<div class="best-price ' + cls + '">' + escHtml(fmted) + '</div>' +
            '<div class="via-book">via ' + escHtml(o.bookmakerTitle) + '</div>' +
            '</div>';
        }).join('');
        html += '<div class="bo-best-label" style="margin-top:0.75rem;">&#9868; Best O/U (Totals)</div>' +
                '<div class="bo-best-row">' + totalsPillsHtml + '</div>';
      }

      return html;
    }

    /**
     * Render one row per bookmaker showing ALL available markets
     * (h2h moneyline, spreads, totals).  No artificial limit applied —
     * every line returned by the API is shown so bettors can compare fully.
     */
    function renderBookmakerRows(bookmakers) {
      const MARKET_LABELS = { h2h: 'Moneyline', spreads: 'Spread', totals: 'Total' };
      return bookmakers.map(function(bm) {
        const marketsHtml = (bm.markets || []).map(function(market) {
          const label = MARKET_LABELS[market.key] || market.key;
          const outcomesHtml = (market.outcomes || []).map(function(o) {
            const cls   = o.price >= 0 ? 'pos' : 'neg';
            const fmted = fmtOdds(o.price);
            const point = (o.point !== undefined && o.point !== null)
              ? ' (' + (o.point > 0 ? '+' : '') + o.point + ')' : '';
            return '<span class="bo-outcome">' + escHtml(o.name) + point + ': ' +
              '<span class="' + cls + '">' + escHtml(fmted) + '</span></span>';
          }).join(' &nbsp;·&nbsp; ');
          return '<div class="bo-market-label">' + escHtml(label) + '</div>' + outcomesHtml;
        }).join('');

        return '<div class="bo-book-row">' +
          '<span class="bo-book-name">' + escHtml(bm.title || bm.key) + '</span>' +
          '<div class="bo-market-group">' + marketsHtml + '</div>' +
          '</div>';
      }).join('');
    }

    /**
     * Render a single event card.
     * @param {object} event       - Odds API event object
     * @param {Date}   renderTime  - Reference time for live-status badge
     */
    function renderEvent(event, renderTime) {
      const bookmakers = event.bookmakers || [];
      const sport      = sportLabel(event.sport_key);
      const matchup    = escHtml(event.away_team) +
        ' <span style="color:var(--muted)">@</span> ' + escHtml(event.home_team);
      const isLive     = new Date(event.commence_time) <= (renderTime || new Date());
      const bookRowsHtml = renderBookmakerRows(bookmakers);

      return '<div class="bo-event-card">' +
        '<div class="bo-event-header">' +
          '<div>' +
            '<div class="bo-sport-label">' + escHtml(sport) + '</div>' +
            '<div class="bo-matchup">' + matchup + '</div>' +
            '<div class="bo-time">&#128336; ' + escHtml(fmtTime(event.commence_time)) +
              (isLive ? ' &nbsp;<span class="bo-live-badge">Live</span>' : '') + '</div>' +
          '</div>' +
          '<span class="bo-books-badge">' + bookmakers.length +
            ' book' + (bookmakers.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +

        (bookmakers.length > 0
          ? renderBestPills(bookmakers)
          : '<p class="loading-msg" style="margin:0">No odds available for this event yet.</p>') +

        (bookRowsHtml
          ? '<details class="bo-all-books">' +
              '<summary>All ' + bookmakers.length + ' bookmaker line(s) &#9662;</summary>' +
              bookRowsHtml +
            '</details>'
          : '') +
        '</div>';
    }

    // ── SEARCH ────────────────────────────────────────────────────────────────

    async function searchOdds() {
      const sport   = document.getElementById('sport-select').value;
      const results = document.getElementById('bo-results');
      const btn     = document.getElementById('search-btn');

      btn.disabled    = true;
      btn.textContent = 'Searching…';
      results.innerHTML = '<p class="loading-msg">Fetching best odds…</p>';

      // Build query parameters for /api/odds
      const now    = new Date();
      const params = new URLSearchParams({ sport: sport, mode: currentMode });

      if (currentMode === 'today') {
        const todayStr = now.toISOString().slice(0, 10);
        params.set('from', todayStr + 'T00:00:00Z');
        params.set('to',   todayStr + 'T23:59:59Z');
      } else if (currentMode === 'date') {
        const date = document.getElementById('date-input').value;
        if (!date) {
          results.innerHTML = '<p class="error-msg">Please select a date.</p>';
          btn.disabled    = false;
          btn.textContent = '🔍 Search Odds';
          return;
        }
        params.set('from', date + 'T00:00:00Z');
        params.set('to',   date + 'T23:59:59Z');
      }
      // live / upcoming modes: no date params — the proxy handles the correct endpoint

      try {
        const res  = await fetch('/api/odds?' + params.toString());
        const data = await res.json();

        if (!res.ok) {
          // Forward specific, actionable error messages based on HTTP status
          const msg = apiErrorMessage(res.status, data && data.error);
          console.error('[best-odds] API error ' + res.status + ':', data);
          results.innerHTML = '<p class="error-msg">' + escHtml(msg) + '</p>';
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          const modeLabels = {
            live:     'live right now',
            today:    'today',
            upcoming: 'the next 7 days',
            date:     'the selected date',
          };
          results.innerHTML =
            '<p class="loading-msg">No events found for ' +
            (modeLabels[currentMode] || 'the selected window') +
            '. Try a different sport or time window.</p>';
          return;
        }

        // Render expand-all toolbar + all event cards (no artificial limit)
        const cardsHtml = data.map(function(e) { return renderEvent(e, now); }).join('');
        results.innerHTML =
          '<div class="bo-toolbar">' +
            '<button class="bo-expand-btn" id="expand-toggle">&#9654; Expand All Lines</button>' +
          '</div>' +
          cardsHtml;

        // Wire up expand/collapse toggle for all <details> elements
        document.getElementById('expand-toggle').addEventListener('click', function() {
          const allDetails = results.querySelectorAll('details.bo-all-books');
          const anyOpen = Array.from(allDetails).some(function(d) { return d.open; });
          allDetails.forEach(function(d) { d.open = !anyOpen; });
          this.textContent = anyOpen ? '▶ Expand All Lines' : '▼ Collapse All Lines';
        });

      } catch (err) {
        results.innerHTML = '<p class="error-msg">Failed to load odds: ' + escHtml(err.message) + '</p>';
        console.error('[best-odds] Search error:', err);
      } finally {
        btn.disabled    = false;
        btn.textContent = '🔍 Search Odds';
      }
    }

  </script>
