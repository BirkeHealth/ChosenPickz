<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChosenPickz — CH0SEN1 PICKZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="todays-picks-page">

  <!-- ── NAV ── -->
  <nav>
    <a class="nav-logo" href="index.html">
      CH<span class="ch-blue">0</span>SEN<span class="ch-blue">1</span> PICKZ
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="todays-picks.html" class="active">ChosenPickz</a>
      <a href="index.html#pricing">Pricing</a>
    </div>
  </nav>

  <main>
    <h1 class="section-heading" style="margin-bottom:0.5rem;">&#127942; ChosenPickz</h1>
    <p id="tp-date-label" style="color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;"></p>

    <!-- Sport filter -->
    <div class="tp-filter-bar" id="tp-filter-bar">
      <button class="tp-filter-btn active" data-sport="all">All Sports</button>
      <button class="tp-filter-btn" data-sport="MLB">⚾ MLB</button>
      <button class="tp-filter-btn" data-sport="NCAAF">🏈 NCAAF</button>
      <button class="tp-filter-btn" data-sport="NCAAB">🏀 NCAAB (Men)</button>
      <button class="tp-filter-btn" data-sport="NCAAW">🏀 NCAAW (Women)</button>
      <button class="tp-filter-btn" data-sport="NFL">🏈 NFL</button>
      <button class="tp-filter-btn" data-sport="NHL">🏒 NHL</button>
      <button class="tp-filter-btn" data-sport="NBA">🏀 NBA</button>
    </div>

    <div id="tp-picks-container" class="picks-list">
      <p class="loading-msg">Loading today's picks…</p>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <p>&copy; 2026 CH0SEN1 PICKZ &mdash; For entertainment purposes only.</p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // ── TODAY'S PICKS PAGE LOGIC ──────────────────────────────────────────

    (function initTodaysPicks() {
      const HCP_PICKS_KEY  = 'cp_handicapper_picks';
      const ADMIN_PICKS_KEY = 'cp_admin_picks';

      function safeJson(key) {
        try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      // Show today's date in heading
      const dateLabel = document.getElementById('tp-date-label');
      if (dateLabel) {
        dateLabel.textContent = new Date().toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }

      const todayStr = new Date().toISOString().slice(0, 10);

      function buildPicks(sportFilter) {
        const hcpAll    = safeJson(HCP_PICKS_KEY);
        const adminAll  = safeJson(ADMIN_PICKS_KEY);

        // Handicapper picks for today
        const hcpToday = hcpAll.filter(function(p) { return p.date === todayStr; });

        // Admin picks (all, since they don't have a date filter in existing system)
        const adminToday = adminAll;

        let allPicks = [];

        // Admin picks
        adminToday.forEach(function(p) {
          if (sportFilter !== 'all' && p.sport !== sportFilter) return;
          allPicks.push({ _type: 'admin', ...p });
        });

        // Handicapper picks
        hcpToday.forEach(function(p) {
          if (sportFilter !== 'all' && p.sport !== sportFilter) return;
          allPicks.push({ _type: 'hcp', ...p });
        });

        return allPicks;
      }

      function renderPicks(sportFilter) {
        const container = document.getElementById('tp-picks-container');
        if (!container) return;

        const picks = buildPicks(sportFilter);

        if (picks.length === 0) {
          container.innerHTML = '<p class="tp-empty">No picks posted for today yet — check back soon!</p>';
          return;
        }

        container.innerHTML = picks.map(function(pick) {
          if (pick._type === 'admin') {
            const starsHtml  = '⭐'.repeat(pick.confidence || 3);
            const postedDate = pick.postedAt ? new Date(pick.postedAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

            return `
              <div class="pick-card-new">
                <div class="pick-left">
                  <span class="pick-sport-badge">${escHtml(pick.sport)}</span>
                  <div class="pick-matchup-new">${escHtml(pick.matchup)}</div>
                  <div class="pick-meta-new">${escHtml(pick.type)} · ${starsHtml} · ${postedDate}</div>
                  <div class="pick-value-new">🏆 ${escHtml(pick.value)}</div>
                  ${pick.note ? `<div class="pick-note-new">${escHtml(pick.note)}</div>` : ''}
                </div>
              </div>`;
          }

          // Handicapper pick
          const postedDate = pick.postedAt ? new Date(pick.postedAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
          return `
            <div class="pick-card-new">
              <div class="pick-left">
                <span class="pick-sport-badge">${escHtml(pick.sport)}</span>
                <div class="pick-matchup-new">${escHtml(pick.matchup)}</div>
                <div class="pick-meta-new">${escHtml(pick.pickType)} · ${postedDate}</div>
                <div class="pick-value-new">🏆 ${escHtml(pick.pickDetails)}</div>
                ${pick.note ? `<div class="pick-note-new">${escHtml(pick.note)}</div>` : ''}
                <div class="pick-handicapper">🏆 ${escHtml(pick.handicapperName || 'Handicapper')}</div>
              </div>
              <span class="result-badge ${escHtml(pick.result)}">${escHtml(pick.result)}</span>
            </div>`;
        }).join('');
      }

      let activeFilter = 'all';
      renderPicks(activeFilter);

      // Wire filter buttons
      const filterBar = document.getElementById('tp-filter-bar');
      if (filterBar) {
        filterBar.addEventListener('click', function(e) {
          const btn = e.target.closest('.tp-filter-btn');
          if (!btn) return;
          activeFilter = btn.dataset.sport || 'all';
          filterBar.querySelectorAll('.tp-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderPicks(activeFilter);
        });
      }
    }());
  </script>
</body>
</html>
